<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Редактор — Адмінка</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:Inter,system-ui,sans-serif;background:#f1f5f9;min-height:100vh;display:flex;flex-direction:column}
    header{background:#1D3557;color:#fff;padding:10px 24px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
    header a{color:#94a3b8;text-decoration:none;font-size:14px}
    header a:hover{color:#fff}
    header h1{font-size:16px;font-weight:600}
    header .sep{color:#475569}
    .toolbar{background:#fff;border-bottom:1px solid #e2e8f0;padding:10px 24px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
    .toolbar button{padding:8px 18px;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;border:none}
    .btn-save{background:#1D3557;color:#fff}
    .btn-save:hover{background:#152b47}
    .btn-save:disabled{opacity:.5;cursor:not-allowed}
    .btn-cancel{background:#f1f5f9;color:#475569}
    .btn-format{background:#fef2f2;color:#E63946}
    .msg{padding:10px 24px;font-size:13px;display:none}
    .msg.ok{display:block;background:#f0fdf4;color:#166534;border-bottom:1px solid #bbf7d0}
    .msg.err{display:block;background:#fef2f2;color:#991b1b;border-bottom:1px solid #fecaca}
    .editor-wrap{flex:1;display:flex;overflow:hidden}
    textarea{flex:1;padding:20px 24px;border:none;outline:none;font-family:'JetBrains Mono','Fira Code',monospace;font-size:13px;line-height:1.6;resize:none;tab-size:2;background:#fafbfc}
    .loading{padding:40px 24px;color:#94a3b8;font-size:15px;text-align:center}
    @media(max-width:600px){header{padding:10px 16px}.toolbar{padding:8px 16px;gap:6px}.toolbar button{padding:8px 14px;font-size:12px}textarea{padding:16px}}
  </style>
</head>
<body>
  <header>
    <a href="/admin/dashboard.html">← Дашборд</a>
    <span class="sep">/</span>
    <h1 id="title">Редактор</h1>
  </header>
  <div class="msg" id="msg"></div>
  <div class="toolbar">
    <button class="btn-format" onclick="format()">Форматувати</button>
    <button class="btn-cancel" onclick="window.location.href='/admin/dashboard.html'">Скасувати</button>
    <span style="flex:1"></span>
    <button class="btn-save" id="saveBtn" onclick="save()">Зберегти</button>
  </div>
  <div class="editor-wrap">
    <textarea id="editor" placeholder="Завантаження..." spellcheck="false"></textarea>
  </div>
  <script>
    const token = localStorage.getItem('admin_token');
    if (!token) { window.location.href = '/admin/'; }

    const params = new URLSearchParams(window.location.search);
    const filePath = params.get('path');
    const fileName = params.get('name') || filePath;
    document.getElementById('title').textContent = fileName || 'Редактор';

    let fileSha = null;

    if (!filePath) {
      document.getElementById('editor').value = 'Помилка: не вказано файл';
    } else {
      loadFile();
    }

    async function loadFile() {
      try {
        const res = await fetch(`/api/git/github/contents/${filePath}?ref=master`, {
          headers: { 'Authorization': `Bearer ${token}` },
        });
        if (!res.ok) throw new Error((await res.json()).error || 'Помилка завантаження');
        const data = await res.json();
        fileSha = data.sha || null;
        const raw = data.content ? decodeURIComponent(escape(atob(data.content))) : JSON.stringify(data, null, 2);
        const editor = document.getElementById('editor');
        editor.value = tryPretty(raw);
        editor.removeAttribute('placeholder');
      } catch (e) {
        document.getElementById('editor').value = 'Помилка: ' + e.message;
      }
    }

    function tryPretty(text) {
      try { return JSON.stringify(JSON.parse(text), null, 2); }
      catch { return text; }
    }

    function format() {
      const editor = document.getElementById('editor');
      editor.value = tryPretty(editor.value);
    }

    function msg(text, type) {
      const m = document.getElementById('msg');
      m.textContent = text;
      m.className = 'msg ' + type;
      if (type === 'ok') setTimeout(() => m.className = 'msg', 3000);
    }

    async function save() {
      const btn = document.getElementById('saveBtn');
      const editor = document.getElementById('editor');
      let content = editor.value;

      try { JSON.parse(content); } catch (e) {
        msg('Невірний JSON: ' + e.message, 'err');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Збереження...';
      msg('Збереження...', '');

      try {
        const body = {
          branch: 'master',
          message: `Оновлено ${fileName || filePath} через адмінку`,
          content: content,
        };
        if (fileSha) body.sha = fileSha;

        const res = await fetch(`/api/git/github/contents/${filePath}`, {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${token}`,
            'Content-Type': 'application/json',
          },
          body: JSON.stringify(body),
        });
        if (!res.ok) {
          const err = await res.json();
          throw new Error(err.details?.message || err.error || 'Помилка');
        }
        const data = await res.json();
        if (data.content && data.content.sha) fileSha = data.content.sha;
        msg('Збережено! Cloudflare Pages задеплоїть зміни автоматично.', 'ok');
        editor.value = tryPretty(content);
      } catch (e) {
        msg('Помилка збереження: ' + e.message, 'err');
      }
      btn.disabled = false;
      btn.textContent = 'Зберегти';
    }
  </script>
</body>
</html>
