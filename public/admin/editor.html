<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Редактор — Адмінка</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:Inter,system-ui,sans-serif;background:#f1f5f9;min-height:100vh;display:flex;flex-direction:column}
    header{background:#1D3557;color:#fff;padding:10px 24px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:10}
    header a{color:#94a3b8;text-decoration:none;font-size:14px}
    header a:hover{color:#fff}
    header h1{font-size:16px;font-weight:600}
    header .sep{color:#475569}
    .toolbar{background:#fff;border-bottom:1px solid #e2e8f0;padding:10px 24px;display:flex;align-items:center;gap:10px;position:sticky;top:48px;z-index:10}
    .toolbar button{padding:8px 18px;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;border:none}
    .btn-save{background:#1D3557;color:#fff}.btn-save:hover{background:#152b47}.btn-save:disabled{opacity:.5}
    .btn-json{background:#f1f5f9;color:#475569}
    .msg{padding:10px 24px;font-size:13px;display:none}
    .msg.ok{display:block;background:#f0fdf4;color:#166534;border-bottom:1px solid #bbf7d0}
    .msg.err{display:block;background:#fef2f2;color:#991b1b;border-bottom:1px solid #fecaca}
    .content{flex:1;max-width:700px;margin:0 auto;padding:20px 16px 60px;width:100%}
    .block{margin-bottom:20px}
    .block-title{font-size:14px;font-weight:700;color:#1D3557;margin-bottom:10px;padding-bottom:6px;border-bottom:2px solid #E63946}
    .row{margin-bottom:12px}
    .row label{display:block;font-size:12px;font-weight:600;color:#475569;margin-bottom:4px}
    input[type=text],input[type=url],input[type=number],textarea,select{width:100%;padding:9px 12px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:14px;font-family:inherit;outline:none;background:#fff}
    input:focus,textarea:focus,select:focus{border-color:#E63946}
    textarea{min-height:70px;resize:vertical;line-height:1.5}
    .list-row{background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:12px;margin-bottom:8px;position:relative}
    .list-row .del{position:absolute;top:6px;right:6px;width:24px;height:24px;border-radius:5px;border:none;background:#fef2f2;color:#E63946;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center}
    .list-row .del:hover{background:#fecaca}
    .add-btn{display:inline-flex;align-items:center;gap:4px;padding:7px 14px;border:2px dashed #cbd5e1;border-radius:8px;background:transparent;color:#64748b;font-size:12px;font-weight:600;cursor:pointer;width:100%;justify-content:center;margin-top:6px}
    .add-btn:hover{border-color:#E63946;color:#E63946;background:#fef2f2}
    .cols{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    @media(max-width:500px){.cols{grid-template-columns:1fr}header{padding:8px 14px}.toolbar{padding:8px 14px}.content{padding:12px 10px 60px}}
    .raw-editor{display:none;flex:1;flex-direction:column}.raw-editor.show{display:flex}
    .raw-editor textarea{flex:1;border:none;outline:none;font-family:monospace;font-size:13px;line-height:1.5;resize:none;padding:16px 20px;background:#fafbfc}
    .form-view.hidden{display:none}
    .json-btn{position:fixed;bottom:16px;right:16px;z-index:20}
    .json-btn button{width:40px;height:40px;border-radius:50%;border:none;background:#1D3557;color:#fff;font-size:16px;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,.15)}
    .loading{padding:40px;text-align:center;color:#94a3b8;font-size:14px}
  </style>
</head>
<body>
  <header>
    <a href="/admin/dashboard.html">← Дашборд</a>
    <span class="sep">/</span>
    <h1 id="title"></h1>
  </header>
  <div class="msg" id="msg"></div>
  <div class="toolbar">
    <button class="btn-json" id="toggleBtn" onclick="toggleView()">JSON</button>
    <span style="flex:1"></span>
    <button class="btn-save" id="saveBtn" onclick="save()">Зберегти</button>
  </div>
  <div class="form-view" id="formView"><div class="content" id="formContent"><div class="loading">Завантаження...</div></div></div>
  <div class="raw-editor" id="rawView"><textarea id="rawEditor" spellcheck="false"></textarea></div>
  <div class="json-btn"><button onclick="toggleView()">{ }</button></div>

  <script>
    const token = localStorage.getItem('admin_token');
    if (!token) location.href = '/admin/';
    const p = new URLSearchParams(location.search);
    const path = p.get('path'), name = p.get('name') || path;
    document.getElementById('title').textContent = name || '';
    let sha = null, data = null, view = 'form';
    if (!path) document.getElementById('formContent').innerHTML = '<div class="loading">Немає файлу</div>';
    else load();

    async function load() {
      try {
        const r = await fetch(`/api/git/github/contents/${path}?ref=master`, { headers: { Authorization: `Bearer ${token}` } });
        if (!r.ok) throw new Error('Помилка');
        const d = await r.json(); sha = d.sha || null;
        data = JSON.parse(d.content ? decodeURIComponent(escape(atob(d.content))) : '{}');
        document.getElementById('rawEditor').value = JSON.stringify(data, null, 2);
        render();
      } catch(e) { document.getElementById('formContent').innerHTML = `<div class="loading">${e.message}</div>`; }
    }

    function toggleView() {
      const btn = document.getElementById('toggleBtn');
      if (view === 'form') { view = 'raw'; btn.textContent = 'Форма';
        document.getElementById('formView').classList.add('hidden');
        document.getElementById('rawView').classList.add('show');
        document.getElementById('rawEditor').value = JSON.stringify(collect(), null, 2);
      } else { view = 'form'; btn.textContent = 'JSON';
        try { data = JSON.parse(document.getElementById('rawEditor').value); render(); }
        catch(e) { msg('Невірний JSON: ' + e.message, 'err'); return; }
        document.getElementById('formView').classList.remove('hidden');
        document.getElementById('rawView').classList.remove('show');
      }
    }

    const L = {
      badge:'Бейдж', primaryButton:'Кнопка "Дізнатись більше"', secondaryButton:'Кнопка "Контакти"',
      name:'Ім\'я', title:'Посада', credo:'Кредо',
      education:'Освіта', experience:'Досвід', language_level:'Рівень мови', category:'Категорія',
      details:'Картки деталей', label:'Підпис', icon:'Іконка', field:'Поле', achievementsTitle:'Заголовок досягнень',
      description:'Опис', categories:'Категорії результатів', color:'Колір бейджа (CSS)',
      fallbackCategory:'Колір для невідомих категорій', year:'Рік', readMore:'Текст "читати далі"',
      emailLabel:'Підпис Email', phoneLabel:'Підпис телефону', profileLabel:'Підпис профілю',
      email:'Email', phone:'Телефон', links:'Соцмережі', platform:'Назва', url:'Посилання',
      site_name:'Назва сайту', logo:'Логотип', rights:'Копірайт', menuLabel:'Напис меню',
      list:'Елементи', link:'Посилання',
    };
    function Lb(k) { return L[k] || k.replace(/_/g,' ').replace(/\b\w/g,c=>c.toUpperCase()); }

    function render() {
      const c = document.getElementById('formContent');
      let h = '';
      for (const k of Object.keys(data)) {
        h += `<div class="block"><div class="block-title">${Lb(k)}</div>`;
        h += field(k, data[k], k);
        h += `</div>`;
      }
      c.innerHTML = h;
    }

    const ICONS = ['Award','BookOpen','BadgeCheck','Briefcase','FlaskConical','Globe','GraduationCap','Trophy','Users'];
    const HIDDEN = ['color','fallbackCategory'];

    function field(key, val, path) {
      if (val === null || val === undefined) return '';
      if (HIDDEN.includes(key)) return '';
      if (typeof val === 'string') {
        if (key === 'icon') {
          return `<div class="row"><label>${Lb(key)}</label><select data-path="${path}">${ICONS.map(i => `<option value="${i}" ${val===i?'selected':''}>${i}</option>`).join('')}</select></div>`;
        }
        const big = val.length > 60 || val.includes('\n');
        return `<div class="row"><label>${Lb(key)}</label>${big ? `<textarea data-path="${path}" rows="3">${esc(val)}</textarea>` : `<input type="text" data-path="${path}" value="${esc(val)}">`}</div>`;
      }
      if (typeof val === 'number') return `<div class="row"><label>${Lb(key)}</label><input type="number" data-path="${path}" value="${val}"></div>`;
      if (typeof val === 'boolean') return `<div class="row"><label>${Lb(key)}</label><select data-path="${path}"><option value="true" ${val?'selected':''}>Так</option><option value="false" ${!val?'selected':''}>Ні</option></select></div>`;
      if (Array.isArray(val)) {
        let h = `<div class="row"><label>${Lb(key)} (${val.length})</label>`;
        val.forEach((item, i) => {
          h += `<div class="list-row"><button class="del" onclick="del('${path}',${i})">×</button>`;
          if (typeof item === 'object' && item) {
            h += `<div class="cols">`;
            for (const ik of Object.keys(item)) h += field(ik, item[ik], `${path}.${i}.${ik}`);
            h += `</div>`;
          } else if (typeof item === 'string') {
            h += `<input type="text" data-path="${path}.${i}" value="${esc(item)}">`;
          }
          h += `</div>`;
        });
        h += `<button class="add-btn" onclick="add('${path}')">+ Додати</button></div>`;
        return h;
      }
      if (typeof val === 'object') {
        let h = '';
        for (const k of Object.keys(val)) h += field(k, val[k], `${path}.${k}`);
        return h;
      }
      return `<div class="row"><label>${Lb(key)}</label><input type="text" data-path="${path}" value="${esc(String(val))}"></div>`;
    }

    function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

    function parsePath(p) {
      const r = []; let c = '';
      for (let i = 0; i < p.length; i++) {
        const ch = p[i];
        if (ch === '.') { if(c) r.push(isNaN(c)?c:Number(c)); c = ''; }
        else c += ch;
      }
      if(c) r.push(isNaN(c)?c:Number(c));
      return r;
    }

    function collect() {
      const d = JSON.parse(JSON.stringify(data));
      document.querySelectorAll('#formContent [data-path]').forEach(el => {
        const parts = parsePath(el.getAttribute('data-path'));
        let obj = d;
        for (let i = 0; i < parts.length - 1; i++) obj = obj[parts[i]];
        const last = parts[parts.length - 1];
        let v = el.value;
        if (el.type === 'number') v = Number(v) || v;
        if (el.tagName === 'SELECT') v = v === 'true' ? true : v === 'false' ? false : v;
        obj[last] = v;
      });
      return d;
    }

    function add(pth) {
      const parts = parsePath(pth); let o = data;
      for (const p of parts) o = o[p];
      if (!Array.isArray(o)) return;
      const t = o[0];
      if (t && typeof t === 'object') { const c = {}; Object.keys(t).forEach(k => c[k] = typeof t[k]==='string'?'':typeof t[k]==='number'?0:t[k]); o.push(c); }
      else if (typeof t === 'string') o.push('');
      else o.push(null);
      render();
    }

    function del(pth, i) {
      const parts = parsePath(pth); let o = data;
      for (const p of parts) o = o[p];
      if (Array.isArray(o)) o.splice(i, 1);
      render();
    }

    function msg(t, type) {
      const m = document.getElementById('msg'); m.textContent = t; m.className = 'msg '+type;
      if (type === 'ok') setTimeout(() => m.className = 'msg', 3000);
    }

    function get() {
      if (view === 'raw') { try { return JSON.parse(document.getElementById('rawEditor').value); } catch(e) { msg('Помилка JSON: '+e.message,'err'); return null; } }
      return collect();
    }

    async function save() {
      const d = get(); if (!d) return;
      const btn = document.getElementById('saveBtn'); btn.disabled = true; btn.textContent = '...';
      try {
        const content = JSON.stringify(d, null, 2);
        const body = { branch:'master', message:`Оновлено ${name||path}`, content };
        if (sha) body.sha = sha;
        const r = await fetch(`/api/git/github/contents/${path}`, {
          method:'POST', headers:{ Authorization:`Bearer ${token}`, 'Content-Type':'application/json' }, body: JSON.stringify(body),
        });
        if (!r.ok) { const e = await r.json(); throw new Error(e.details?.message || e.error || 'Помилка'); }
        const result = await r.json();
        if (result.content?.sha) sha = result.content.sha;
        data = d;
        document.getElementById('rawEditor').value = content;
        msg('Збережено!', 'ok');
      } catch(e) { msg(e.message, 'err'); }
      btn.disabled = false; btn.textContent = 'Зберегти';
    }
  </script>
</body>
</html>
