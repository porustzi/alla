backend:
  name: git-gateway
  branch: master

media_folder: public/images
public_folder: /images

collections:
  - name: site
    label: Весь сайт
    delete: false
    editor:
      preview: false
    files:
      - name: all_content
        label: Весь сайт (зверху донизу)
        file: src/content/site.json
        format: json
        fields:
          - label: '══════════ 1. ГОЛОВНИЙ ЕКРАН ══════════'
            name: _sep_hero
            widget: string
            required: false

          - label: Головний екран
            name: heroSection
            widget: object
            fields:
              - label: Бейдж
                name: badge
                widget: string
              - label: Кнопка 1 (текст)
                name: primaryButton
                widget: string
              - label: Кнопка 2 (текст)
                name: secondaryButton
                widget: string

          - label: '══════════ 2. ПРОФІЛЬ ══════════'
            name: _sep_profile
            widget: string
            required: false

          - label: Персональні дані
            name: profileData
            widget: object
            fields:
              - label: Ім'я
                name: name
                widget: string
              - label: Посада
                name: title
                widget: string
              - label: Кредо
                name: credo
                widget: text
              - label: Освіта
                name: education
                widget: text
              - label: Досвід
                name: experience
                widget: text
              - label: Рівень мови
                name: language_level
                widget: string
              - label: Категорія
                name: category
                widget: string

          - label: '══════════ 3. ПРО МЕНЕ ══════════'
            name: _sep_about
            widget: string
            required: false

          - label: Секція "Про мене"
            name: aboutSection
            widget: object
            fields:
              - label: Заголовок секції
                name: title
                widget: string
              - label: Картки з деталями
                name: details
                widget: list
                summary: '{{fields.label}}'
                fields:
                  - label: Підпис
                    name: label
                    widget: string
                  - label: Іконка
                    name: icon
                    widget: select
                    options:
                      - Award
                      - BookOpen
                      - BadgeCheck
                      - Briefcase
                      - FlaskConical
                      - Globe
                      - GraduationCap
                      - Trophy
                      - Users
                  - label: Поле профілю
                    name: field
                    widget: string
              - label: Заголовок блоку досягнень
                name: achievementsTitle
                widget: string

          - label: Список досягнень
            name: achievementsList
            widget: object
            fields:
              - label: Досягнення
                name: list
                widget: list
                summary: '{{fields.title}}'
                fields:
                  - label: Назва
                    name: title
                    widget: string
                  - label: Опис
                    name: description
                    widget: text
                  - label: Іконка
                    name: icon
                    widget: select
                    options:
                      - Award
                      - BookOpen
                      - BadgeCheck
                      - Briefcase
                      - FlaskConical
                      - Globe
                      - GraduationCap
                      - Trophy
                      - Users

          - label: '══════════ 4. РЕЗУЛЬТАТИ ══════════'
            name: _sep_results
            widget: string
            required: false

          - label: Налаштування секції "Результати"
            name: resultsSection
            widget: object
            fields:
              - label: Заголовок секції
                name: title
                widget: string
              - label: Опис
                name: description
                widget: text
              - label: Категорії
                name: categories
                widget: list
                summary: '{{fields.name}}'
                fields:
                  - label: Назва
                    name: name
                    widget: string
                  - label: Іконка
                    name: icon
                    widget: select
                    options:
                      - Award
                      - BookOpen
                      - BadgeCheck
                      - Briefcase
                      - FlaskConical
                      - Globe
                      - GraduationCap
                      - Trophy
                      - Users
                  - label: CSS колір
                    name: color
                    widget: string
              - label: Запасний колір
                name: fallbackCategory
                widget: string

          - label: Список результатів учнів
            name: resultsList
            widget: object
            fields:
              - label: Результати
                name: list
                widget: list
                summary: '{{fields.title}}'
                fields:
                  - label: Заголовок
                    name: title
                    widget: string
                  - label: Опис
                    name: description
                    widget: text
                  - label: Категорія
                    name: category
                    widget: select
                    options:
                      - Успішність
                      - Олімпіади
                      - Конкурси
                      - Проєкти
                  - label: Рік
                    name: year
                    widget: number
                    value_type: int

          - label: '══════════ 5. МЕТОДИЧНА РОБОТА ══════════'
            name: _sep_methods
            widget: string
            required: false

          - label: Налаштування секції "Методична робота"
            name: methodsSection
            widget: object
            fields:
              - label: Заголовок секції
                name: title
                widget: string
              - label: Текст кнопки "читати далі"
                name: readMore
                widget: string

          - label: Список методичних матеріалів
            name: methodsList
            widget: object
            fields:
              - label: Матеріали
                name: list
                widget: list
                summary: '{{fields.title}}'
                fields:
                  - label: Тема
                    name: title
                    widget: string
                  - label: Опис
                    name: description
                    widget: text
                  - label: Посилання
                    name: link
                    widget: string
                    required: false

          - label: '══════════ 6. КОНТАКТИ ══════════'
            name: _sep_contact
            widget: string
            required: false

          - label: Налаштування секції "Контакти"
            name: contactSection
            widget: object
            fields:
              - label: Заголовок секції
                name: title
                widget: string
              - label: Підпис для Email
                name: emailLabel
                widget: string
              - label: Підпис для телефону
                name: phoneLabel
                widget: string
              - label: Підпис для профілю
                name: profileLabel
                widget: string

          - label: Контактні дані
            name: contactInfo
            widget: object
            fields:
              - label: Email
                name: email
                widget: string
              - label: Телефон
                name: phone
                widget: string
                required: false
              - label: Посилання
                name: links
                widget: list
                summary: '{{fields.platform}}'
                fields:
                  - label: Платформа
                    name: platform
                    widget: string
                  - label: URL
                    name: url
                    widget: string
