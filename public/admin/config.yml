backend:
  name: git-gateway
  branch: master

media_folder: public/images
public_folder: /images

collections:
  - name: site
    label: Весь сайт
    delete: false
    editor:
      preview: false
    files:
      - name: all_content
        label: Весь сайт (зверху донизу)
        file: src/content/site.json
        format: json
        fields:
          - label: '═══ 1. НАВІГАЦІЯ (шапка) ═══'
            name: _separator_navbar
            widget: string
            required: false

          - label: Логотип
            name: navbar
            widget: object
            fields:
              - label: Текст логотипу
                name: logo
                widget: string
              - label: Посилання в меню
                name: links
                widget: list
                summary: '{{fields.label}}'
                fields:
                  - label: ID (якір)
                    name: id
                    widget: string
                  - label: Текст
                    name: label
                    widget: string
              - label: Підпис кнопки меню
                name: menuLabel
                widget: string

          - label: '═══ 2. ГОЛОВНА (HERO) ═══'
            name: _separator_hero
            widget: string
            required: false

          - label: Головний екран
            name: hero
            widget: object
            fields:
              - label: Бейдж
                name: badge
                widget: string
              - label: Кнопка 1
                name: primaryButton
                widget: string
              - label: Кнопка 2
                name: secondaryButton
                widget: string

          - label: '═══ 3. ПРОФІЛЬ ═══'
            name: _separator_profile
            widget: string
            required: false

          - label: Персональні дані
            name: profile
            widget: object
            fields:
              - label: Ім'я
                name: name
                widget: string
              - label: Посада
                name: title
                widget: string
              - label: Кредо
                name: credo
                widget: text
              - label: Освіта
                name: education
                widget: text
              - label: Досвід
                name: experience
                widget: text
              - label: Рівень мови
                name: language_level
                widget: string
              - label: Категорія
                name: category
                widget: string

          - label: '═══ 4. ПРО МЕНЕ + ДОСЯГНЕННЯ ═══'
            name: _separator_about
            widget: string
            required: false

          - label: Секція "Про мене"
            name: about
            widget: object
            fields:
              - label: Заголовок
                name: title
                widget: string
              - label: Деталі
                name: details
                widget: list
                summary: '{{fields.label}}'
                fields:
                  - label: Підпис
                    name: label
                    widget: string
                  - label: Іконка
                    name: icon
                    widget: select
                    options:
                      - Award
                      - BookOpen
                      - BadgeCheck
                      - Briefcase
                      - FlaskConical
                      - Globe
                      - GraduationCap
                      - Trophy
                      - Users
                  - label: Поле профілю
                    name: field
                    widget: string
              - label: Заголовок досягнень
                name: achievementsTitle
                widget: string

          - label: Список досягнень
            name: achievements
            widget: object
            fields:
              - label: Досягнення
                name: list
                widget: list
                summary: '{{fields.title}}'
                fields:
                  - label: Назва
                    name: title
                    widget: string
                  - label: Опис
                    name: description
                    widget: text
                  - label: Іконка
                    name: icon
                    widget: select
                    options:
                      - Award
                      - BookOpen
                      - BadgeCheck
                      - Briefcase
                      - FlaskConical
                      - Globe
                      - GraduationCap
                      - Trophy
                      - Users

          - label: '═══ 5. РЕЗУЛЬТАТИ ═══'
            name: _separator_results
            widget: string
            required: false

          - label: Секція "Результати"
            name: resultsSection
            widget: object
            fields:
              - label: Заголовок
                name: title
                widget: string
              - label: Опис
                name: description
                widget: text
              - label: Категорії
                name: categories
                widget: list
                summary: '{{fields.name}}'
                fields:
                  - label: Назва
                    name: name
                    widget: string
                  - label: Іконка
                    name: icon
                    widget: select
                    options:
                      - Award
                      - BookOpen
                      - BadgeCheck
                      - Briefcase
                      - FlaskConical
                      - Globe
                      - GraduationCap
                      - Trophy
                      - Users
                  - label: CSS колір
                    name: color
                    widget: string
              - label: Запасний колір
                name: fallbackCategory
                widget: string

          - label: Список результатів
            name: results
            widget: object
            fields:
              - label: Результати учнів
                name: list
                widget: list
                summary: '{{fields.title}}'
                fields:
                  - label: Заголовок
                    name: title
                    widget: string
                  - label: Опис
                    name: description
                    widget: text
                  - label: Категорія
                    name: category
                    widget: select
                    options:
                      - Успішність
                      - Олімпіади
                      - Конкурси
                      - Проєкти
                  - label: Рік
                    name: year
                    widget: number
                    value_type: int

          - label: '═══ 6. МЕТОДИЧНА РОБОТА ═══'
            name: _separator_methods
            widget: string
            required: false

          - label: Секція "Методична робота"
            name: methodsSection
            widget: object
            fields:
              - label: Заголовок
                name: title
                widget: string
              - label: Читати далі
                name: readMore
                widget: string

          - label: Список методів
            name: methods
            widget: object
            fields:
              - label: Методичні матеріали
                name: list
                widget: list
                summary: '{{fields.title}}'
                fields:
                  - label: Тема
                    name: title
                    widget: string
                  - label: Опис
                    name: description
                    widget: text
                  - label: Посилання
                    name: link
                    widget: string
                    required: false

          - label: '═══ 7. КОНТАКТИ ═══'
            name: _separator_contact
            widget: string
            required: false

          - label: Секція "Контакти"
            name: contactSection
            widget: object
            fields:
              - label: Заголовок
                name: title
                widget: string
              - label: Email підпис
                name: emailLabel
                widget: string
              - label: Телефон підпис
                name: phoneLabel
                widget: string
              - label: Профіль підпис
                name: profileLabel
                widget: string

          - label: Контактна інформація
            name: contact
            widget: object
            fields:
              - label: Email
                name: email
                widget: string
              - label: Телефон
                name: phone
                widget: string
                required: false
              - label: Посилання
                name: links
                widget: list
                summary: '{{fields.platform}}'
                fields:
                  - label: Платформа
                    name: platform
                    widget: string
                  - label: URL
                    name: url
                    widget: string

          - label: '═══ 8. ФУТЕР (підвал) ═══'
            name: _separator_footer
            widget: string
            required: false

          - label: Футер
            name: footer
            widget: object
            fields:
              - label: Логотип
                name: logo
                widget: string
              - label: Права
                name: rights
                widget: string
